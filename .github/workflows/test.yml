name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Necessário para Deployment Checks - Vercel dispara quando o build está pronto
  repository_dispatch:
    types: [vercel.deployment.ready]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: github.event_name != 'repository_dispatch'

      - name: Checkout (Vercel)
        uses: vercel/repository-dispatch/actions/checkout@v1
        if: github.event_name == 'repository_dispatch'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build


      - name: Notify Vercel
        if: always() && github.event_name == 'repository_dispatch'
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - creditall-challenge: test"
