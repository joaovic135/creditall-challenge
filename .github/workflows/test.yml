name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Necessário para Deployment Checks - Vercel dispara quando o build está pronto
  repository_dispatch:
    types: [vercel.deployment.ready]

jobs:
  # Nome usado pelo Vercel Deployment Checks - não alterar sem atualizar as configs
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      # repository_dispatch usa GITHUB_SHA do default branch - precisamos do checkout do Vercel
      - name: Checkout
        uses: actions/checkout@v4
        if: github.event_name != 'repository_dispatch'

      - name: Checkout (Vercel)
        uses: vercel/repository-dispatch/actions/checkout@v1
        if: github.event_name == 'repository_dispatch'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      # Obrigatório para Deployment Checks - reporta status ao Vercel
      # Sempre executa para que o Vercel encontre o check (push e repository_dispatch)
      - name: Notify Vercel
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Test"
